<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./style.css">

    <!-- CrazyGames SDK -->
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>

    <style>
        canvas:focus {
            outline: none;
        }

        html, body {
            padding: 0;
            margin: 0;
            overflow: hidden;
            overscroll-behavior: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            height: 100%;
        }
    </style>

    <!-- Additional head modules -->

</head>
<body class="{{{ SPLASH_SCREEN_STYLE.toLowerCase() }}}">

    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
    </div>
    <div id="loading-cover" style="display:none;">
        <div id="unity-loading-bar">
            <div id="unity-logo"><img src="Images/logo.png"></div>
            <div id="unity-progress-bar-empty" style="display: none;">
                <div id="unity-progress-bar-full"></div>
            </div>
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Additional body modules -->

    <script>
        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
        const config = {
            dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
            frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
            codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
            {{{ MEMORY_FILENAME ? 'memoryUrl: buildUrl + "/' + MEMORY_FILENAME + '",' : '' }}}
            {{{ SYMBOLS_FILENAME ? 'symbolsUrl: buildUrl + "/' + SYMBOLS_FILENAME + '",' : '' }}}
            streamingAssetsUrl: "StreamingAssets",
            companyName: "{{{ COMPANY_NAME }}}",
            productName: "{{{ PRODUCT_NAME }}}",
            productVersion: "{{{ PRODUCT_VERSION }}}"
        };

        const container = document.querySelector("#unity-container");
        const canvas = document.querySelector("#unity-canvas");
        const loadingCover = document.querySelector("#loading-cover");
        const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");
        const spinner = document.querySelector('.spinner');

        const canFullscreen = (function () {
            for (const key of [
                'exitFullscreen',
                'webkitExitFullscreen',
                'webkitCancelFullScreen',
                'mozCancelFullScreen',
                'msExitFullscreen',
            ]) {
                if (key in document) {
                    return true;
                }
            }
            return false;
        }());

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            container.className = "unity-mobile";
            //config.devicePixelRatio = 1;
        }

        const backgroundImage = {{{ BACKGROUND_FILENAME ? '"url(\'' + buildUrl + '/' + BACKGROUND_FILENAME.replace(/'/g, '%27') + '\') center / cover"' : '"url(\'Images/background.png\') center / cover"' }}};
        loadingCover.style.background = backgroundImage;
        loadingCover.style.display = "";

        const runtimeReceiverObjectName = "CrazyGamesRuntimeReceiver";
        let startUnityInstance;
        let unityGameInstance = null;
        let initGame = false;
        let syncInit = false;
        let isVisibility = true;
        let isPausedGame = false;

        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('visibilitychange', () => SetVisibility(!document.hidden));
        window.addEventListener('blur', () => SetVisibility(false));
        window.addEventListener('focus', () => SetVisibility(true));

        window.addEventListener('pointerdown', () => {
            FocusGame();
            SetVisibility(true);
        });

        window.addEventListener('resize', () => FocusGame());
        document.addEventListener('fullscreenchange', () => FocusGame());

        const oRequestPointerLock = Element.prototype.requestPointerLock;
        Element.prototype.requestPointerLock = async function hkRequestPointerLock(...args) {
            try {
                (args[0] ||= {}).unadjustedMovement = true;
                await oRequestPointerLock.apply(this, args);
            } catch (err) {
                console.log(err);
            }
        };

        function InstallBlurFocusBlocker() {
            if (!('onblur' in document)) return;
            if (window.blurFocusHandlersInstalled) return;

            window.addEventListener('blur', function () {
                let blockerButton = document.createElement('button');
                blockerButton.style.position = 'fixed';
                blockerButton.style.top = '0';
                blockerButton.style.left = '0';
                blockerButton.style.width = '100%';
                blockerButton.style.height = '100%';
                blockerButton.style.zIndex = '9999';
                blockerButton.style.backgroundColor = 'rgba(0, 0, 0, 0)';
                blockerButton.style.border = 'none';
                blockerButton.style.cursor = 'default';

                document.body.appendChild(blockerButton);

                function removeBlocker() {
                    if (blockerButton && blockerButton.parentNode) {
                        blockerButton.parentNode.removeChild(blockerButton);
                    }
                    window.removeEventListener('focus', removeBlocker);
                }

                window.addEventListener('focus', removeBlocker);
            });

            window.blurFocusHandlersInstalled = true;
        }

        function FocusGame(checkingPauseStatus = true) {
            if (!canvas) return;

            requestAnimationFrame(() => {
                if (checkingPauseStatus && isPausedGame) return;

                const active = document.activeElement;
                if (active && (active.tagName === 'INPUT' ||
                    active.tagName === 'TEXTAREA' ||
                    active.isContentEditable
                )) {
                    return;
                }

                canvas.focus({ preventScroll: true });
            });
        }

        function SetVisibility(visibility) {
            if (unityGameInstance !== null && initGame === true && isVisibility !== visibility) {
                isVisibility = visibility;
                if (!visibility) {
                    SendRuntimeMessage('SetFocusWindowGame', 'false');
                }
                else {
                    SendRuntimeMessage('SetFocusWindowGame', 'true');
                }
            }
        }

        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            startUnityInstance = function () {
                createUnityInstance(canvas, config, (progress) => {
                    spinner.style.display = "none";
                    progressBarEmpty.style.display = "";
                    const adjustedProgress = Math.max(progress, 0.05);
                    progressBarFull.style.width = `${100 * adjustedProgress}%`;
                }).then((unityInstance) => {
                    unityGameInstance = unityInstance;
                    loadingCover.style.background = "";
                    loadingCover.style.display = "none";
                    FocusGame();
                    // Fill Background [Build Modify]
                }).catch((message) => {
                    console.error(message);
                });
            };
            
            InstallBlurFocusBlocker();
            InitializeCrazyGamesSdk();
            
            if (IsLocalHost() || syncInit)
                StartUnityInstanceIfNeeded();
        };

        function StartUnityInstanceIfNeeded() {
            if (spinner.style.display !== "none")
                startUnityInstance();
        }

        function IsLocalHost() {
            try {
                if (window.top !== window) {
                    return false;
                }

                const host = window.location.hostname;
                if (host === "localhost" || host === "127.0.0.1" || host.endsWith(".local")) {
                    LogStyledMessage("Local Host");
                    return true;
                }

                return false;
            } 
            catch (error) {
                console.error("Error checking the local host:", error);
                return false;
            }
        }

        function SendRuntimeMessage(method) {
            if (unityGameInstance == null)
                return;

            if (!initGame) {
                setTimeout(function () {
                    if (unityGameInstance)
                        unityGameInstance.SendMessage(runtimeReceiverObjectName, method);
                }, 100);
            }
            else {
                unityGameInstance.SendMessage(runtimeReceiverObjectName, method);
            }
                
        }
        function SendRuntimeMessage(method, arg) {
            if (unityGameInstance == null)
                return;

            if (!initGame) {
                setTimeout(function () {
                    unityGameInstance.SendMessage(runtimeReceiverObjectName, method, arg);
                }, 100);
            }
            else {
                unityGameInstance.SendMessage(runtimeReceiverObjectName, method, arg);
            }
        }

        function LogStyledMessage(message, style = 'color: #FFDF73; background-color: #454545') {
            console.log('%c' + message, style);
        }

        async function InitializeCrazyGamesSdk() {
            try {
                if (!IsLocalHost() && window.CrazyGames && window.CrazyGames.SDK) {
                    LogStyledMessage('CrazyGames SDK script loaded');
                }
            } catch (e) {
                console.error('CrazyGames SDK bootstrap error: ', e);
            }

            if (!IsLocalHost() && !syncInit)
                StartUnityInstanceIfNeeded();
        }

        function InitGame() {
            initGame = true;

            setTimeout(function () {
                if (isPausedGame == true)
                    SendRuntimeMessage('SetPauseGame', 'true');
            }, 100);

            // Additional start modules
        }

        // Additional script modules

        document.body.appendChild(script);
    </script>
</body>
</html>
